name: Create Task Issues

on:
  workflow_dispatch:
  push:
    branches:
      - copilot/create-issues-from-tasks
    paths:
      - scripts/create-issues.sh
      - .github/workflows/create-issues.yml

permissions:
  issues: write
  contents: read

jobs:
  create-issues:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create issues from tasks.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/create-issues.sh
